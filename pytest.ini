[pytest]
# 命令行默认参数：生成 Allure 测试结果，并在每次运行前清空历史记录
addopts = -vs -q --alluredir=./report/allure-results --clean-alluredir

# 测试用例路径匹配规则
testpaths = tests test_cases

# 测试文件命名规则
python_files = test_*.py

# 测试类与函数命名规则
python_classes = Test*
python_functions = test_*

markers =
    live_platform: 依赖真实 Android/iOS/Web 环境的回放测试
    live_web: 真实 Chromium web 冒烟（需 RUN_LIVE_WEB_SMOKE=1，默认跳过）
    live_android: 真实 Android 设备冒烟（需 RUN_LIVE_ANDROID_SMOKE=1，默认跳过）
    live_ios: 真实 iOS 模拟器冒烟（需 RUN_LIVE_IOS_SMOKE=1，默认跳过）
